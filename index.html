<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu Điểm Thi vào NTB 🌸</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <div class="main-container">
        <div class="card-box text-center init-animation">
            <h2 class="card-title">Tra cứu bằng số báo danh</h2>
            <div class="input-group">
                <span class="search-icon">🔍</span>
                <input type="text" id="sbdInput" placeholder="Nhập số báo danh để tra cứu...">
            </div>
            <button id="btnTraDiem">TRA CỨU</button>
        </div>

        <div id="statusMessage" class="status-box" style="display: none;">
            <p id="statusText">✨ Đang truy xuất bảng điểm, đợi tớ xíu nha...</p>
        </div>

        <div id="resultContainer" style="display: none;">
            
            <div class="card-box card-info">
                <h3 class="section-heading"><span class="blue-line"></span>Thông tin thí sinh</h3>
                <div class="info-grid">
                    <div class="info-block">
                        <span class="info-label">Họ và tên</span>
                        <span class="info-value" id="resName">-</span>
                    </div>
                    <div class="info-block">
                        <span class="info-label">Số báo danh</span>
                        <span class="info-value" id="resSBD">-</span>
                    </div>
                    <div class="info-block">
                        <span class="info-label">Phòng thi</span>
                        <span class="info-value" id="resPhongThi">-</span>
                    </div>
                </div>
            </div>

            <div class="card-box card-result">
                <h3 class="section-heading"><span class="blue-line"></span>Kết quả</h3>
                <div class="table-responsive">
                    <table class="result-table">
                        <thead>
                            <tr>
                                <th>Môn</th>
                                <th>Thời gian thi</th>
                                <th>Địa điểm thi</th>
                                <th>Bắt đầu làm bài</th>
                                <th>Điểm</th>
                            </tr>
                        </thead>
                        <tbody id="tableBodyScores">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script src="js/data_local.js"></script>
    
    <script src="js/api.js"></script>
    
    <script src="js/animation.js"></script>
    
    <script src="js/particles.js"></script>
    
    <script src="js/search.js"></script>
    
    <script src="js/app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu Điểm Thi THPT NTB</title>
    <!-- Font chữ Chibi đáng yêu -->
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Hiệu ứng hạt bay ngẫu nhiên nền -->
    <canvas id="particle-canvas"></canvas>

    <div class="chibi-container">
        
        <!-- HEADER UI: Gom logo chuột nhỏ lên góc trên bên trái của biểu ngữ -->
        <div class="chibi-header">
            <img src="assets/logo/logo.png" alt="Chibi Mouse" class="chibi-logo-left">
            <div class="chibi-banner">
                🌸 TRA ĐIỂM THI THPT NTB 🌸
            </div>
        </div>

        <!-- Khung Tìm Kiếm -->
        <div class="search-box">
            <p class="search-title">✨ Nhập số báo danh để xem kết quả điểm của cậu nhé! ✨</p>
            <div class="search-form">
                <input type="text" id="sbdInput" placeholder="Ví dụ: 550123" maxlength="10">
                <!-- Thêm đầy đủ ID và Class phụ để dù file JS của cậu viết kiểu gì cũng nhận được sự kiện click -->
                <button id="btnTraDiem" class="btnSearch btn-search">Tra Điểm Ngay 🐾</button>
            </div>
        </div>

        <!-- Thông báo Trạng thái Server (Ngủ đông / Đang tải) -->
        <div id="statusMessage" class="status-box warning-box" style="display: none;">
            ⏰ <span id="statusText">Chờ máy chủ 'bận tỉnh giấc' nhé! Thường 20-30 giây thui, cậu nhớ bấm lại nhé! 🌸</span>
        </div>

        <!-- Bảng Kết Quả Điểm Chibi -->
        <div id="resultContainer" class="result-card" style="display: none;">
            <h3>🎉 Kết Quả Của Cậu Đây Nè! 🎉</h3>
            <div class="table-responsive">
                <table class="chibi-table">
                    <thead>
                        <tr>
                            <th>Số Báo Danh</th>
                            <th>Tên Học Sinh</th>
                            <th>Toán</th>
                            <th>Văn</th>
                            <th>Anh</th>
                            <th>TĐ</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td id="resSBD" class="highlight-cell">--</td>
                            <td id="resName">--</td>
                            <td id="resToan">--</td>
                            <td id="resVan">--</td>
                            <td id="resAnh">--</td>
                            <td id="resTD" class="highlight-total">--</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Thư viện pháo hoa từ mạng -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- NHÚNG ĐÚNG VÀ ĐỦ 100% CẤU TRÚC FILE JS THỰC TẾ CỦA CẬU -->
    <script src="js/api.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/loading.js"></script>
    <script src="js/notification.js"></script>
    <script src="js/search.js"></script>
    <script src="js/confetti.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
